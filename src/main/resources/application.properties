spring.application.name=rewards-api
server.port=8080
server.servlet.context-path=/

# H2 database
spring.datasource.url=jdbc:h2:mem:rewardsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

# Resilience4j
resilience4j.circuitbreaker.instances.rewardsService.sliding-window-size=5
resilience4j.circuitbreaker.instances.rewardsService.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.rewardsService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.rewardsService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.rewardsService.permitted-number-of-calls-in-half-open-state=2

# Logging
logging.level.root=INFO
logging.level.com.retailer.rewards=DEBUG
