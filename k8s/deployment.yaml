apiVersion: apps/v1
kind: Deployment
metadata:
  name: rewards-api
  labels:
    app: rewards-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rewards-api
  template:
    metadata:
      labels:
        app: rewards-api
    spec:
      containers:
        - name: rewards-api
          image: rewards-api:2.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: docker
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
